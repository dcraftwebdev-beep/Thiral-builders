<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiral Builders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #f5a623, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }
    p.sub {
      font-size: 1.05rem;
      color: #ccc;
      max-width: 500px;
      line-height: 1.7;
    }
    .badge {
      margin-top: 40px;
      padding: 10px 25px;
      border: 2px solid #f5a623;
      border-radius: 30px;
      font-size: 0.9rem;
      color: #f5a623;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Thiral Builders</h1>
  <p class="sub">Our website is temporarily unavailable. We're working on it and will be back online shortly.</p>
  <div class="badge">SITE UNDER MAINTENANCE</div>
</body>
</html>
