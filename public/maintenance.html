<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVT CONSTRUCTIONS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #f5a623, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    p.tagline {
      font-size: 1.2rem;
      color: #f5a623;
      font-weight: 700;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    p.sub {
      font-size: 1rem;
      color: #ccc;
      max-width: 500px;
      line-height: 1.7;
    }
    .badge {
      margin-top: 40px;
      padding: 10px 25px;
      border: 2px solid #f5a623;
      border-radius: 30px;
      font-size: 0.9rem;
      color: #f5a623;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>SVT CONSTRUCTIONS</h1>
  <p class="tagline">No cap, no cash, no site 💸</p>
  <p class="sub">Great things are built on solid foundations — and so are websites. This one's paused until the invoice clears. Hit us up to finish the job.</p>
  <div class="badge">🔒 ON HOLD — PENDING PAYMENT 🔒</div>
</body>
</html>
